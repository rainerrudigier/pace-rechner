  .stripe {
    height: 6px;
    background: linear-gradient(to right, #ea580c, #f97316, transparent);
  }
  .header { padding: 1.25rem 1.5rem 1rem; }
  .eyebrow {
    text-transform: uppercase;
    letter-spacing: 0.3em;
    font-size: 0.75rem;
    color: #737373;
    margin: 0;
  }
  .title {
    font-size: 1.5rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    margin: 0.25rem 0 0;
  }
  .row {
    padding: 1.25rem 1.5rem;
    border-top: 1px solid #262626;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .row-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .label {
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 0.75rem;
    color: #737373;
  }
  .unit { font-size: 0.75rem; color: #525252; }
  .row-inputs { display: flex; justify-content: flex-end; }
  .field-group { display: flex; align-items: flex-end; gap: 0.25rem; }
  input.num {
    text-align: right;
    background: transparent;
    font-family: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 1.875rem;
    font-weight: 700;
    color: #fafafa;
    border: none;
    border-bottom: 2px solid #404040;
    padding: 0 0 2px;
    outline: none;
    -webkit-appearance: none;
    border-radius: 0;
  }
  input.num:focus { border-bottom-color: #f97316; }
  .w-28 { width: 7rem; }
  .w-14 { width: 3.5rem; }
  .w-12 { width: 3rem; }
  .colon {
    font-family: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 1.875rem;
    font-weight: 700;
    color: #737373;
    padding-bottom: 2px;
  }
  .footer { padding: 1rem 1.5rem; border-top: 1px solid #262626; }
  .footer p { margin: 0; font-size: 0.75rem; color: #737373; line-height: 1.625; }
</style>
</head>
<body>
  <div class="card">
    <div class="stripe"></div>
    <div class="header">
      <p class="eyebrow">Tempo · Pace · Zeit</p>
      <h1 class="title">Lauf-Rechner</h1>
    </div>

    <div class="row">
      <div class="row-head"><span class="label">Distanz</span><span class="unit">km</span></div>
      <div class="row-inputs"><input class="num w-28" id="distance" inputmode="decimal"></div>
    </div>

    <div class="row">
      <div class="row-head"><span class="label">Geschwindigkeit</span><span class="unit">km/h</span></div>
      <div class="row-inputs"><input class="num w-28" id="speed" inputmode="decimal"></div>
    </div>

    <div class="row">
      <div class="row-head"><span class="label">Pace</span><span class="unit">min / km</span></div>
      <div class="row-inputs">
        <div class="field-group">
          <input class="num w-14" id="pace-min" inputmode="numeric">
          <span class="colon">:</span>
          <input class="num w-14" id="pace-sec" inputmode="numeric">
        </div>
      </div>
    </div>

    <div class="row">
      <div class="row-head"><span class="label">Gesamtzeit</span><span class="unit">Std : Min : Sek</span></div>
      <div class="row-inputs">
        <div class="field-group">
          <input class="num w-12" id="time-h" inputmode="numeric">
          <span class="colon">:</span>
          <input class="num w-12" id="time-m" inputmode="numeric">
          <span class="colon">:</span>
          <input class="num w-12" id="time-s" inputmode="numeric">
        </div>
      </div>
    </div>

    <div class="footer">
      <p>Ändere einen Wert – die anderen werden sofort neu berechnet. Die Distanz bleibt dabei fix, Tempo, Pace und Gesamtzeit hängen voneinander ab.</p>
    </div>
  </div>

<script>
(function () {
  let distance = 5;  // km
  let speed = 10;    // km/h

  function speedToPace(speedKmh) {
    if (!speedKmh || speedKmh <= 0) return { min: 0, sec: 0 };
    const totalSec = Math.round(3600 / speedKmh);
    return { min: Math.floor(totalSec / 60), sec: totalSec % 60 };
  }

  function speedAndDistanceToTime(speedKmh, distanceKm) {
    if (!speedKmh || speedKmh <= 0 || !distanceKm || distanceKm <= 0) {
      return { h: 0, m: 0, s: 0 };
    }
    const totalSec = Math.round((distanceKm / speedKmh) * 3600);
    return {
      h: Math.floor(totalSec / 3600),
      m: Math.floor((totalSec % 3600) / 60),
      s: totalSec % 60
    };
  }

  function setFromPace(min, sec) {
    const totalSec = Math.max(0, min) * 60 + Math.max(0, sec);
    if (totalSec <= 0) return;
    speed = 3600 / totalSec;
  }

  function setFromTime(h, m, s) {
    const totalSec = Math.max(0, h) * 3600 + Math.max(0, m) * 60 + Math.max(0, s);
    if (totalSec <= 0 || distance <= 0) return;
    speed = (distance * 3600) / totalSec;
  }

  const bound = [];

  function bindEditable(input, getValue, setValue, opts) {
    opts = opts || {};
    const decimal = !!opts.decimal;
    const max = opts.max;
    const pattern = decimal ? /^\d*([.,]\d*)?$/ : /^\d*$/;
    let focused = false;

    function format(v) {
      return decimal ? String(Math.round(v * 100) / 100) : String(Math.round(v));
    }

    function refresh() {
      if (!focused) input.value = format(getValue());
    }

    input.value = format(getValue());
    input.dataset.last = input.value;

    input.addEventListener('focus', function () { focused = true; });

    input.addEventListener('input', function () {
      const raw = input.value;
      if (!pattern.test(raw)) {
        input.value = input.dataset.last || '';
        return;
      }
      input.dataset.last = raw;
      if (raw === '' || raw === '.' || raw === ',') return;
      const normalized = raw.replace(',', '.');
      const num = decimal ? parseFloat(normalized) : parseInt(normalized, 10);
      if (isNaN(num)) return;
      setValue(max !== undefined ? Math.min(num, max) : num);
      bound.forEach(function (b) { b.refresh(); });
    });

    input.addEventListener('blur', function () {
      focused = false;
      input.value = format(getValue());
      input.dataset.last = input.value;
    });

    bound.push({ refresh: refresh });
  }

  bindEditable(document.getElementById('distance'),
    function () { return distance; },
    function (v) { distance = v; },
    { decimal: true });

  bindEditable(document.getElementById('speed'),
    function () { return speed; },
    function (v) { speed = v; },
    { decimal: true });

  bindEditable(document.getElementById('pace-min'),
    function () { return speedToPace(speed).min; },
    function (v) { setFromPace(v, speedToPace(speed).sec); });

  bindEditable(document.getElementById('pace-sec'),
    function () { return speedToPace(speed).sec; },
    function (v) { setFromPace(speedToPace(speed).min, v); },
    { max: 59 });

  bindEditable(document.getElementById('time-h'),
    function () { return speedAndDistanceToTime(speed, distance).h; },
    function (v) {
      const t = speedAndDistanceToTime(speed, distance);
      setFromTime(v, t.m, t.s);
    });

  bindEditable(document.getElementById('time-m'),
    function () { return speedAndDistanceToTime(speed, distance).m; },
    function (v) {
      const t = speedAndDistanceToTime(speed, distance);
      setFromTime(t.h, v, t.s);
    },
    { max: 59 });

  bindEditable(document.getElementById('time-s'),
    function () { return speedAndDistanceToTime(speed, distance).s; },
    function (v) {
      const t = speedAndDistanceToTime(speed, distance);
      setFromTime(t.h, t.m, v);
    },
    { max: 59 });
})();
</script>
</body>
</html>
